<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Tubo Oeste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #c00000;
      --primary-dark: #a00000;
      --text:         #1e293b;
      --text-muted:   #475569;
      --bg:           #f8fafc;
      --white:        #ffffff;
      --border:       #e2e8f0;
      --danger:       #dc2626;
      --radius:       12px;
      --shadow-md:    0 4px 20px rgba(0,0,0,.09), 0 2px 8px rgba(0,0,0,.05);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Open Sans', Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-wrap img { height: 56px; }
    .logo-wrap p {
      margin: 8px 0 0;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: .5px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 160ms;
      margin-bottom: 18px;
    }
    input:focus { border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 160ms;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .erro {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/assets/logo.png" alt="Tubo Oeste" onerror="this.style.display='none'">
      <p>SISTEMA DE PROMOÇÕES</p>
    </div>
    <form id="form">
      <label for="username">Usuário</label>
      <input id="username" type="text" autocomplete="username" required>
      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button class="btn" type="submit" id="btn">Entrar</button>
      <p class="erro" id="erro"></p>
    </form>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn  = document.getElementById('btn');
      const erro = document.getElementById('erro');
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      erro.textContent = '';

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (data.ok) {
        window.location.href = '/admin';
      } else {
        erro.textContent = data.error || 'Erro ao fazer login';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
