<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display TV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cor-primaria: #1a73e8;
      --cor-secundaria: #ffffff;
    }

    body {
      background: var(--cor-primaria);
      color: var(--cor-secundaria);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      background: rgba(0,0,0,.15);
      flex-shrink: 0;
    }
    .logo { height: 60px; object-fit: contain; }
    .loja-nome { font-size: 1.5rem; font-weight: 700; }
    .relogio { font-size: 2rem; font-weight: 300; letter-spacing: 2px; }

    /* Área de promoções */
    .promo-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 3rem;
      overflow: hidden;
    }

    /* Slide de promoção */
    .slide {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      gap: 4rem;
    }
    .slide.ativo { display: flex; }

    .slide-img {
      width: 45%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 16px;
      flex-shrink: 0;
    }

    .slide-info { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
    .slide-titulo { font-size: 3.5rem; font-weight: 800; line-height: 1.1; }
    .slide-descricao { font-size: 1.5rem; opacity: .85; }
    .slide-preco-de { font-size: 1.5rem; opacity: .7; text-decoration: line-through; }
    .slide-preco-por {
      font-size: 5rem;
      font-weight: 900;
      color: #ffeb3b;
      text-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    /* Fallback (sem promoções) */
    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.5rem;
      width: 100%;
      height: 100%;
    }
    .fallback.ativo { display: flex; }
    .fallback-tagline { font-size: 4rem; font-weight: 800; line-height: 1.1; }
    .fallback-cidade { font-size: 2rem; opacity: .8; }
    .fallback-pills { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .pill {
      padding: .5rem 1.5rem;
      background: rgba(255,255,255,.2);
      border-radius: 99px;
      font-size: 1.2rem;
    }

    /* Indicadores */
    .indicadores {
      display: flex;
      justify-content: center;
      gap: .75rem;
      padding: 1.5rem;
      flex-shrink: 0;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
      transition: background .3s;
    }
    .dot.ativo { background: #fff; }
  </style>
</head>
<body>
  <header class="header">
    <img class="logo" id="logo" src="" alt="" />
    <span class="loja-nome" id="loja-nome"></span>
    <span class="relogio" id="relogio"></span>
  </header>

  <div class="promo-area" id="promo-area"></div>
  <div class="indicadores" id="indicadores"></div>

  <script>
    const slug = location.pathname.split('/tv/')[1]?.split('/')[0];
    const API  = '/api/public/' + slug;

    let promocoes = [];
    let idx = 0;
    let intervalo;

    // Relógio
    function tick() {
      const now = new Date();
      document.getElementById('relogio').textContent =
        now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }
    tick();
    setInterval(tick, 1000);

    // Aplica branding
    async function carregarBranding() {
      try {
        const r = await fetch(API + '/branding');
        const b = await r.json();
        document.documentElement.style.setProperty('--cor-primaria', b.cor_primaria || '#1a73e8');
        document.documentElement.style.setProperty('--cor-secundaria', b.cor_secundaria || '#ffffff');
        document.getElementById('loja-nome').textContent = b.nome || '';
        const logo = document.getElementById('logo');
        if (b.logo_url) { logo.src = b.logo_url; logo.alt = b.nome; }
        document.title = b.nome || 'Display TV';
        return b;
      } catch { return {}; }
    }

    // Renderiza slides ou fallback
    function renderizar(promos, branding) {
      const area = document.getElementById('promo-area');
      const dots = document.getElementById('indicadores');
      area.innerHTML = '';
      dots.innerHTML = '';

      if (promos.length === 0) {
        const fb = document.createElement('div');
        fb.className = 'fallback ativo';
        fb.innerHTML = `
          <div class="fallback-tagline">${branding.fallback_tagline || 'Confira nossas ofertas!'}</div>
          ${branding.fallback_cidade ? `<div class="fallback-cidade">${branding.fallback_cidade}</div>` : ''}
          ${branding.fallback_categorias ? `<div class="fallback-pills">${branding.fallback_categorias.split(',').map(c => `<span class="pill">${c.trim()}</span>`).join('')}</div>` : ''}
        `;
        area.appendChild(fb);
        return;
      }

      promos.forEach((p, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide' + (i === 0 ? ' ativo' : '');
        slide.innerHTML = `
          ${p.imagem_url ? `<img class="slide-img" src="${p.imagem_url}" alt="${p.titulo}" />` : ''}
          <div class="slide-info">
            <div class="slide-titulo">${p.titulo}</div>
            ${p.descricao ? `<div class="slide-descricao">${p.descricao}</div>` : ''}
            ${p.preco_de ? `<div class="slide-preco-de">R$ ${Number(p.preco_de).toFixed(2)}</div>` : ''}
            ${p.preco_por ? `<div class="slide-preco-por">R$ ${Number(p.preco_por).toFixed(2)}</div>` : ''}
          </div>
        `;
        area.appendChild(slide);

        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' ativo' : '');
        dots.appendChild(dot);
      });
    }

    function proximoSlide() {
      const slides = document.querySelectorAll('.slide');
      const dots   = document.querySelectorAll('.dot');
      if (slides.length === 0) return;
      slides[idx].classList.remove('ativo');
      dots[idx].classList.remove('ativo');
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add('ativo');
      dots[idx].classList.add('ativo');
    }

    async function carregar() {
      const branding = await carregarBranding();
      try {
        const r = await fetch(API + '/promocoes');
        promocoes = await r.json();
      } catch { promocoes = []; }
      idx = 0;
      clearInterval(intervalo);
      renderizar(promocoes, branding);
      if (promocoes.length > 1) {
        intervalo = setInterval(proximoSlide, 8000);
      }
    }

    carregar();
    setInterval(carregar, 5 * 60 * 1000); // atualiza a cada 5 min
  </script>
</body>
</html>
