<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — Tubo Oeste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #c00000;
      --primary-dark: #a00000;
      --text:         #1e293b;
      --text-muted:   #475569;
      --bg:           #f8fafc;
      --white:        #ffffff;
      --border:       #e2e8f0;
      --danger:       #dc2626;
      --green:        #16a34a;
      --radius:       12px;
      --shadow-md:    0 4px 20px rgba(0,0,0,.09), 0 2px 8px rgba(0,0,0,.05);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Open Sans', Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      margin: 0 0 6px;
      color: var(--primary);
    }
    .sub { font-size: 13px; color: var(--text-muted); margin: 0 0 28px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 160ms;
      margin-bottom: 18px;
    }
    input:focus { border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 160ms;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
    .msg.erro  { color: var(--danger); }
    .msg.sucesso { color: var(--green); }
  </style>
</head>
<body>
  <div class="card">
    <h2>Configuração Inicial</h2>
    <p class="sub">Crie o usuário administrador. Esta página ficará desativada após o cadastro.</p>
    <form id="form">
      <label for="username">Usuário</label>
      <input id="username" type="text" autocomplete="off" required>
      <label for="password">Senha <span style="font-weight:400">(mín. 6 caracteres)</span></label>
      <input id="password" type="password" required minlength="6">
      <label for="confirm">Confirmar senha</label>
      <input id="confirm" type="password" required minlength="6">
      <button class="btn" type="submit" id="btn">Criar administrador</button>
      <p class="msg" id="msg"></p>
    </form>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = '';

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      if (password !== confirm) {
        msg.className = 'msg erro';
        msg.textContent = 'As senhas não coincidem';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Criando...';

      const res  = await fetch('/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password,
        }),
      });
      const data = await res.json();

      if (data.ok) {
        msg.className = 'msg sucesso';
        msg.textContent = 'Administrador criado! Redirecionando...';
        setTimeout(() => window.location.href = '/login', 1500);
      } else {
        msg.className = 'msg erro';
        msg.textContent = data.error || 'Erro ao criar usuário';
        btn.disabled = false;
        btn.textContent = 'Criar administrador';
      }
    });
  </script>
</body>
</html>
