<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tubo Oeste — Exportar Stories</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/stories/style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <img src="/logo.png" alt="Tubo Oeste" class="topbar-logo">
      <div class="topbar-right">
        <span class="topbar-sub">Exportar para Stories</span>
        <div class="topbar-actions" id="topbar-actions" style="display:none">
          <button class="btn-zip" id="btn-zip">⬇ Baixar todos (ZIP)</button>
          <button class="btn-ig-all" id="btn-ig-all">📤 Publicar todos</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/admin" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581
               9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827
               .369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z"/>
        </svg>
        Promoções
      </a>
      <a href="/stories" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25
               2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3
               0V3h3V1.5m-3 0h3m-3 18.75h3"/>
        </svg>
        Stories
      </a>
      <a href="/display2" class="nav-item" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504
               1.125-1.125V4.875C21.375 4.254 20.871 3.75 20.25 3.75H3.75c-.621
               0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125Z"/>
        </svg>
        TV Display
      </a>
    </div>
  </nav>

  <main class="container">
    <p class="page-hint">Cada card abaixo é um slide 1080×1920px pronto para o Instagram Stories.</p>
    <div id="grid" class="stories-grid"></div>
    <p id="empty-msg" class="empty-msg" style="display:none">Nenhuma promoção ativa no momento.</p>
  </main>

  <!-- Bibliotecas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="/stories/app.js"></script>
</body>
</html>
